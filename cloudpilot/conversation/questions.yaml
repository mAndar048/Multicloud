ASK_USECASE:
  prompt: "What are you deploying?"
  options:
    - label: "Static Website"
      value: "static_website"
    - label: "Containerized App (Docker)"
      value: "containerized_app"
    - label: "Database"
      value: "database"

ASK_SCALE:
  prompt: "How many users do you expect?"
  options:
    - label: "Up to 1,000"
      value: "low"
    - label: "1,000 - 50,000"
      value: "medium"
    - label: "50,000+"
      value: "high"

ASK_CLOUD:
  prompt: "Which cloud provider?"
  options:
    - label: "AWS"
      value: "aws"
    - label: "GCP"
      value: "gcp"
    - label: "DigitalOcean"
      value: "digitalocean"

ASK_REGION:
  prompt: "Which region should we deploy to?"
  options:
    - label: "AWS US East (N. Virginia)"
      value: "us-east-1"
    - label: "AWS US West (Oregon)"
      value: "us-west-2"
    - label: "AWS Europe (Ireland)"
      value: "eu-west-1"
    - label: "AWS Asia Pacific (Tokyo)"
      value: "ap-northeast-1"
    - label: "GCP US Central"
      value: "us-central1"
    - label: "GCP Europe West"
      value: "europe-west1"
    - label: "GCP Asia East"
      value: "asia-east1"
    - label: "DigitalOcean New York"
      value: "nyc3"
    - label: "DigitalOcean San Francisco"
      value: "sfo3"
    - label: "DigitalOcean London"
      value: "lon1"
    - label: "DigitalOcean Singapore"
      value: "sgp1"

CONFIRM:
  prompt: "Ready to deploy with this configuration?"
  options:
    - label: "Yes, deploy"
      value: "confirm"
    - label: "No, edit"
      value: "edit"
